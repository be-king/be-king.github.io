---
layout: default
---

<article class="post">
  <header class="post-header">
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {% if page.tags.size > 0 %}
      <span class="post-meta-sep">&middot;</span>
      <span class="post-tags">
        {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
      </span>
      {% endif %}
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.subtitle %}<p class="post-subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>

  <div class="post-body">
    {{ content }}
  </div>

  <footer class="post-footer">
    <a href="/blog/" class="post-back">&larr; All posts</a>
  </footer>
</article>
